syntax = "proto3";

package trading;

service TradingService {
  rpc SubmitOrder (OrderRequest) returns (OrderResponse);
  rpc GetMarketData (MarketDataRequest) returns (stream MarketDataResponse);
  rpc RunBacktest (BacktestRequest) returns (BacktestResponse);
  rpc GetRegime (RegimeRequest) returns (RegimeResponse);
}

message OrderRequest {
  string strategy_id = 1;
  string symbol = 2;
  double quantity = 3;
  string side = 4; // 'buy' | 'sell'
  double price = 5; // 0 = market order
}

message OrderResponse {
  string order_id = 1;
  string status = 2;
  double filled_qty = 3;
  double avg_price = 4;
}

message MarketDataRequest {
  string symbol = 1;
}

message MarketDataResponse {
  string symbol = 1;
  double current_price = 2;
}

message BacktestRequest {
  string strategy_dna_json = 1;
  string symbol = 2;
  string start_date = 3;
  string end_date = 4;
  double initial_capital = 5;
}

message BacktestResponse {
  double sharpe = 1;
  double max_drawdown = 2;
  double total_return = 3;
  double win_rate = 4;
  int32 total_trades = 5;
}

message RegimeRequest {
  string symbol = 1;
}

message RegimeResponse {
  string regime = 1;
}
